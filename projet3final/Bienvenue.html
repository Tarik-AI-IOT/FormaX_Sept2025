<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenue</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body>
    <img class="image-gradient" src="images/gradient.png" alt="Image" />
    <div class="layer-blur"></div>

    <div class="container">
      <header>
        <h1 data-aos="fade-down" data-aos-duration="1500" class="logo">
          FormaX
        </h1>

        <nav>
          <a data-aos="fade-down" data-aos-duration="1500" href="Bienvenue.html"
            >Bienvenue</a
          >
          <a
            data-aos="fade-down"
            data-aos-duration="2000"
            href="listeFormation.html"
            >Formations</a
          >
          <a data-aos="fade-down" data-aos-duration="2500" href="aPropos.html"
            >À Propos</a
          >
          <a data-aos="fade-down" data-aos-duration="3000" href="Contact.html"
            >Contact</a
          >
        </nav>

        <a
          data-aos="fade-down"
          data-aos-duration="1500"
          href="Contact.html"
          class="btn-inscrire"
          >Inscrire</a
        >
      </header>
      <div>
        <spline-viewer
          class="move3d"
          url="https://prod.spline.design/ojpzYmsAvBS2paJM/scene.splinecode"
        ></spline-viewer>
      </div>

      <!--Changement--><!--Changement-->
      <!--Changement-->
      <!--Changement-->

      <main>
        <div class="content">
          <div
            data-aos="fade-zoom-in"
            data-aos-easing="ease-in-back"
            data-aos-delay="300"
            data-aos-offset="0"
            data-aos-duration="1500"
            class="tag-box"
          >
            <div class="tag">Découvrez &bull; FormaX</div>
          </div>

          <h1
            data-aos="fade-zoom-in"
            data-aos-easing="ease-in-back"
            data-aos-delay="300"
            data-aos-offset="0"
            data-aos-duration="2000"
          >
            Le savoir des développeurs,<br />à portée de clic
          </h1>

          <p
            data-aos="fade-zoom-in"
            data-aos-easing="ease-in-back"
            data-aos-delay="300"
            data-aos-offset="0"
            data-aos-duration="2500"
            class="description"
          >
            Des formations en ligne conçues pour vous propulser vers votre futur
            métier.
          </p>
          <div
            data-aos="fade-zoom-in"
            data-aos-easing="ease-in-back"
            data-aos-delay="300"
            data-aos-offset="0"
            data-aos-duration="3000"
            class="buttons"
          >
            <a href="#" class="button-get-started">À propos</a>
            <a href="#" class="btn-signing-main">Formations</a>
          </div>
        </div>
        <spline-viewer
          class="robot3d"
          url="https://prod.spline.design/7SMCnYXSLL7BHnNI/scene.splinecode"
        ></spline-viewer>
      </main>
    </div>

    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.10.74/build/spline-viewer.js"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script src="javascript.js"></script>
  </body>
</html>
